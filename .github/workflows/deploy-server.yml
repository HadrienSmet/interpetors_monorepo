name: Deploy server to alwaysdata

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Utilise EXACTEMENT la version de pnpm déclarée dans packageManager
      - name: Enable Corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate
          pnpm -v

      - name: Install workspace deps
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace package (types)
        run: pnpm --filter @repo/types build

      - name: Prisma generate (server)
        run: pnpm --filter ./apps/server... exec prisma generate

      - name: Build server
        run: pnpm --filter ./apps/server... build

      - name: Show server dist output (debug)
        run: |
          ls -la apps/server/dist || true
          find apps/server/dist -maxdepth 4 -type f -name "main.js" -print || true

      - name: Prepare deploy bundle (root-based)
        run: |
          rm -rf .deploy_bundle
          mkdir -p .deploy_bundle

          # Root workspace files (indispensables pour pnpm + workspace:*)
          cp package.json .deploy_bundle/
          cp pnpm-workspace.yaml .deploy_bundle/
          cp pnpm-lock.yaml .deploy_bundle/

          # Server (sources nécessaires + build)
          mkdir -p .deploy_bundle/apps/server
          cp -r apps/server/dist .deploy_bundle/apps/server/
          cp -r apps/server/prisma .deploy_bundle/apps/server/
          cp apps/server/package.json .deploy_bundle/apps/server/
          cp apps/server/nest-cli.json .deploy_bundle/apps/server/ || true
          cp apps/server/tsconfig*.json .deploy_bundle/apps/server/ || true

          # Types (runtime: constants/enum/etc si importés par le server)
          mkdir -p .deploy_bundle/packages/types
          cp -r packages/types/dist .deploy_bundle/packages/types/
          cp packages/types/package.json .deploy_bundle/packages/types/
          cp packages/types/tsconfig*.json .deploy_bundle/packages/types/ || true

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALWAYSDATA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.ALWAYSDATA_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }} \
          "mkdir -p '${{ secrets.ALWAYSDATA_PATH }}/apps/server' '${{ secrets.ALWAYSDATA_PATH }}/packages/types'"

      - name: Deploy bundle via rsync
        uses: Burnett01/rsync-deployments@v8
        with:
          switches: -az --delete
          path: .deploy_bundle/
          remote_path: ${{ secrets.ALWAYSDATA_PATH }}/
          remote_host: ${{ secrets.ALWAYSDATA_HOST }}
          remote_user: ${{ secrets.ALWAYSDATA_USER }}
          remote_key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
